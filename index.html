<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrispScale — AI Image Upscaler</title>
    <meta name="description" content="Batch upscale your images with AI-powered Recraft Crisp Upscale technology.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="ambient-glow ambient-glow-1"></div>
    <div class="ambient-glow ambient-glow-2"></div>
    <div class="grid-overlay"></div>

    <!-- Header -->
    <header id="app-header">
        <div class="header-content">
            <div class="logo-group">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <rect x="2" y="2" width="10" height="10" rx="2" fill="url(#g1)" opacity="0.9"/>
                        <rect x="16" y="2" width="10" height="10" rx="2" fill="url(#g1)" opacity="0.6"/>
                        <rect x="2" y="16" width="10" height="10" rx="2" fill="url(#g1)" opacity="0.6"/>
                        <rect x="16" y="16" width="10" height="10" rx="2" fill="url(#g1)" opacity="0.3"/>
                        <defs><linearGradient id="g1" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#6d28d9"/></linearGradient></defs>
                    </svg>
                </div>
                <h1 class="logo-text">CrispScale</h1>
                <span class="logo-badge">AI</span>
            </div>
            <div class="header-actions">
                <div class="queue-status hidden" id="queue-status">
                    <div class="queue-dot"></div>
                    <span id="queue-text">0 / 0</span>
                </div>
                <button id="download-all-btn" class="btn-glass btn-success hidden">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span>Download All</span>
                </button>
                <button id="clear-btn" class="btn-glass hidden">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    <span>Clear</span>
                </button>
                <button id="api-key-btn" class="btn-glass" title="API Key">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main id="app-main">
        <!-- Upload Zone (always visible when no images or as add-more) -->
        <section id="upload-section">
            <div id="drop-zone" class="drop-zone">
                <div class="drop-zone-content">
                    <div class="upload-icon-wrapper">
                        <svg class="upload-icon" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        <div class="upload-pulse"></div>
                    </div>
                    <h3 class="drop-zone-title" id="drop-zone-title">Drop your images here</h3>
                    <p class="drop-zone-subtitle">Select multiple files — PNG, JPG, WEBP supported</p>
                    <button id="browse-btn" class="btn-primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        Choose Files
                    </button>
                </div>
                <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp" multiple hidden>
            </div>
        </section>

        <!-- Image Queue Grid -->
        <section id="queue-section" class="hidden">
            <div class="queue-header">
                <div class="queue-header-left">
                    <h2 class="queue-title">Upscale Queue</h2>
                    <span class="queue-count" id="queue-count"></span>
                </div>
                <div class="queue-header-right">
                    <button id="add-more-btn" class="btn-primary btn-sm">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Add More
                    </button>
                    <button id="upscale-all-btn" class="btn-upscale btn-sm">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,3 21,3 21,9"/><polyline points="9,21 3,21 3,15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                        Upscale All
                    </button>
                </div>
            </div>
            <div id="image-grid" class="image-grid"></div>
        </section>

        <!-- Toasts -->
        <div id="error-toast" class="toast hidden">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            <span id="error-message"></span>
        </div>
        <div id="success-toast" class="toast success-toast hidden">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>
            <span id="success-message"></span>
        </div>
    </main>

    <!-- API Key Modal -->
    <div id="api-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3>Configure API Key</h3>
                <button id="modal-close" class="modal-close"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            <div class="modal-body">
                <p class="modal-description">Enter your KIE AI API key. Stored locally only.</p>
                <div class="input-group">
                    <label for="api-key-input">API Key</label>
                    <div class="input-wrapper">
                        <input type="password" id="api-key-input" placeholder="Your API key" autocomplete="off">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-api-key" class="btn-primary">Save Key</button>
            </div>
        </div>
    </div>

    <!-- Hidden file input for "Add More" -->
    <input type="file" id="add-more-input" accept="image/png,image/jpeg,image/webp" multiple hidden>

    <script src="app.js"></script>
</body>
</html>
